services:
  - type: web
    name: alphalens-backend
    env: python
    buildCommand: "pip install uv && uv pip install --python /opt/render/project/src/.venv/bin/python -r requirements.txt && python verify_models.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FINNHUB_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_DB
        sync: false
      - key: REDIS_TTL_SECONDS
        sync: false
