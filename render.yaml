services:
  - type: web
    name: alphalens-backend
    env: python
    buildCommand: "pip install uv && uv pip install --system -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FINNHUB_API_KEY
        sync: false
      - key: REDIS_HOST
        value: "" # Optional on Render, will fallback to non-cached prediction
