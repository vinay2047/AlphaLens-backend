version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  price-prediction:
    build:
      context: .
      dockerfile: services/price-prediction/Dockerfile
    ports:
      - '8002:8002'
    env_file:
      - services/price-prediction/.env.example
    depends_on:
      - redis
    volumes:
      - ./ml_models:/app/ml_models

volumes:
  redis-data:
